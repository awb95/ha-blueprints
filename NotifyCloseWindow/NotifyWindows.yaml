blueprint:
  name: Raumklima Sommer / Winter
  description: >
    Überwacht Raumtemperatur, Solltemperatur, Außentemperatur und Fenster.

    Sommer:
      - Fenster offen UND Außentemperatur > Raumtemperatur > Solltemperatur
      - Außentemperatur mindestens 2°C unter Raumtemperatur
        UND Raumtemperatur > Solltemperatur

    Winter:
      - Raumtemperatur mindestens 5°C unter Solltemperatur
      - Fenster länger als 30 Minuten geöffnet

  domain: automation

  input:

    room_name:
      name: Raumname
      selector:
        text:

    summer_sensor:
      name: Sommer/Winter Sensor
      description: on = Sommer, off = Winter
      selector:
        entity:
          domain: binary_sensor

    outside_temp:
      name: Außentemperatur
      selector:
        entity:
          domain: sensor

    room_temp:
      name: Raumtemperatur
      selector:
        entity:
          domain: sensor

    target_temp:
      name: Solltemperatur
      selector:
        entity:
          domain: sensor

    window:
      name: Fensterkontakt
      selector:
        entity:
          domain: binary_sensor

    notify_action:
      name: Notify
      selector:
        action:
          filter:
            domain: notify

mode: single

trigger:

  - platform: state
    entity_id: !input outside_temp

  - platform: state
    entity_id: !input room_temp

  - platform: state
    entity_id: !input target_temp

  - platform: state
    entity_id: !input summer_sensor

  - platform: state
    entity_id: !input window

  - platform: state
    entity_id: !input window
    to: "on"
    for:
      minutes: 30

variables:

  room: !input room_name

  summer_entity: !input summer_sensor
  outside_entity: !input outside_temp
  room_entity: !input room_temp
  target_entity: !input target_temp
  window_entity: !input window

  summer: >
    {{ is_state(summer_entity,'on') }}

  outside: >
    {{ states(outside_entity)|float(0) }}

  inside: >
    {{ states(room_entity)|float(0) }}

  target: >
    {{ states(target_entity)|float(0) }}

  window_open: >
    {{ is_state(window_entity,'on') }}

action:

  - choose:

      ####################################################
      # Sommer: Fenster offen obwohl draußen wärmer
      ####################################################

      - conditions:
          - condition: template
            value_template: "{{ summer }}"
          - condition: template
            value_template: "{{ window_open }}"
          - condition: template
            value_template: "{{ outside > inside }}"
          - condition: template
            value_template: "{{ inside > target }}"
        sequence:

          - action: !input notify_action
            data:
              title: "{{ room }}"
              message: >
                Fenster schließen.
                Außen {{ outside | round(1) }}°C,
                innen {{ inside | round(1) }}°C,
                Soll {{ target | round(1) }}°C.

      ####################################################
      # Sommer: Jetzt lüften
      ####################################################

      - conditions:
          - condition: template
            value_template: "{{ summer }}"
          - condition: template
            value_template: "{{ outside <= inside-2 }}"
          - condition: template
            value_template: "{{ inside > target }}"
        sequence:

          - action: !input notify_action
            data:
              title: "{{ room }}"
              message: >
                Jetzt lüften.
                Außen {{ outside | round(1) }}°C,
                innen {{ inside | round(1) }}°C.

      ####################################################
      # Winter: Raum zu kalt
      ####################################################

      - conditions:
          - condition: template
            value_template: "{{ not summer }}"
          - condition: template
            value_template: "{{ inside <= target-5 }}"
        sequence:

          - action: !input notify_action
            data:
              title: "{{ room }}"
              message: >
                Raumtemperatur zu niedrig.
                Ist: {{ inside | round(1) }}°C
                Soll: {{ target | round(1) }}°C.

      ####################################################
      # Winter: Fenster 30 Minuten offen
      ####################################################

      - conditions:
          - condition: template
            value_template: "{{ not summer }}"
          - condition: template
            value_template: >
              {{ trigger.entity_id == window_entity }}
          - condition: template
            value_template: "{{ window_open }}"
        sequence:

          - action: !input notify_action
            data:
              title: "{{ room }}"
              message: >
                Fenster seit mindestens 30 Minuten geöffnet.

    default: []
